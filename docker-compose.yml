services:
  frontend: 
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args: 
        VITE_API_URL: /api
    container_name: frontend
    ports: 
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/letsencrypt:/var/www/letsencrypt:ro
    depends_on: 
      - api
    restart: unless-stopped
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: api
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Jwt__Key: ${JWT_KEY}
      Telegram__BotToken: ${TELEGRAM_BOT_TOKEN}
      Telegram__BotLink: https://t.me/${TELEGRAM_BOT_USERNAME}
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      ReceiptScanner__BaseUrl: http://receipt_scanner:8080/
      ReceiptScanner__TimeoutSeconds: 300
      Cors__AllowedOrigins__0: http://localhost
      Cors__AllowedOrigins__1: http://127.0.0.1
      # Cors__AllowedOrigins__0: https://SERVER_IP
      # Cors__AllowedOrigins__1: http://SERVER_IP
    depends_on:
      db:
        condition: service_healthy
      receipt_scanner:
        condition: service_started
    restart: unless-stopped

  telegram_bot:
    build:
      context: ./telegram_bot
      dockerfile: Dockerfile
    container_name: telegram_bot
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEB_APP_URL: ${TELEGRAM_WEB_APP_URL}
      BACKEND_BASE_URL: http://api:8080
      TELEGRAM_HTTP_TIMEOUT_SECONDS: 120
      BACKEND_HTTP_TIMEOUT_SECONDS: 300
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  receipt_scanner:
    build:
      context: ./receipt_scanner
      dockerfile: Dockerfile
    container_name: receipt_scanner
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_RECEIPT_MODEL: ${OPENAI_RECEIPT_MODEL:-gpt-4.1-mini}
      OPENAI_RECEIPT_TIMEOUT_SECONDS: 300
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
